name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  nightly:
    name: Nightly Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build snapshot binaries
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker build context
        run: |
          cp dist/pbmate_linux_amd64_v1/pbmate pbmate_linux_amd64
          cp dist/pbmate_linux_arm64_v8.0/pbmate pbmate_linux_arm64

      - name: Build and push Docker image
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/jcechace/pbmate:nightly \
            --push .

      - name: Create rolling pre-release
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          gh release create nightly dist/*.tar.gz dist/checksums.txt \
            --prerelease \
            --title "Nightly ($(date -u +%Y-%m-%d))" \
            --notes "Built from main at $(git rev-parse --short HEAD). Not a stable release."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
