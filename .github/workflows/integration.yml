name: Integration Tests

on:
  push:
    branches: [main]
    paths: ['sdk/**']
  pull_request:
    branches: [main]
    paths: ['sdk/**']

permissions:
  contents: read

jobs:
  integration:
    name: SDK Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - run: task sdk:integration
