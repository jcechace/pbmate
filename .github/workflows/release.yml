name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        run: |
          git cliff --config cliff.toml --latest --strip header > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::RELEASE_NOTES.md is empty — no matching commits found"
          fi

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker build context
        run: |
          cp dist/pbmate_linux_amd64_v1/pbmate pbmate_linux_amd64
          cp dist/pbmate_linux_arm64_v8.0/pbmate pbmate_linux_arm64

      - name: Build and push Docker image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          docker buildx build --platform linux/amd64,linux/arm64 \
            -t ghcr.io/jcechace/pbmate:${VERSION} \
            -t ghcr.io/jcechace/pbmate:latest \
            --push .
