version: "2"

run:
  go: "1.26"

linters:
  default: standard
  enable:
    - gocritic
    - revive
    - misspell
    - errorlint
  disable:
    # Phase 2: fields/methods used in phase 3 (huh.Field implementation) not yet wired up.
    - unused
  settings:
    revive:
      rules:
        - name: exported
          disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
