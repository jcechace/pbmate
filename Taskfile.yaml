version: "3"

vars:
  SDK_DIR: ./sdk
  MCP_DIR: ./mcp

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ---------------------------------------------------------------------------
  # SDK
  # ---------------------------------------------------------------------------
  sdk:build:
    desc: Build the SDK module
    dir: "{{.SDK_DIR}}"
    cmds:
      - go build ./...

  sdk:vet:
    desc: Run go vet on the SDK module
    dir: "{{.SDK_DIR}}"
    cmds:
      - go vet ./...

  sdk:test:
    desc: Run SDK tests
    dir: "{{.SDK_DIR}}"
    cmds:
      - go test ./...

  sdk:lint:
    desc: Run golangci-lint on the SDK module
    dir: "{{.SDK_DIR}}"
    cmds:
      - golangci-lint run ./...

  sdk:fmt:
    desc: Auto-fix formatting on the SDK module
    dir: "{{.SDK_DIR}}"
    cmds:
      - go fmt ./...

  sdk:check:
    desc: Build, vet, lint, and test the SDK
    cmds:
      - task: sdk:build
      - task: sdk:vet
      - task: sdk:lint
      - task: sdk:test

  # ---------------------------------------------------------------------------
  # TUI (root module)
  # ---------------------------------------------------------------------------
  tui:build:
    desc: Build the TUI module
    cmds:
      - go build ./...

  tui:vet:
    desc: Run go vet on the TUI module
    cmds:
      - go vet ./...

  tui:lint:
    desc: Run golangci-lint on the TUI module
    cmds:
      - golangci-lint run ./...

  tui:fmt:
    desc: Auto-fix formatting on the TUI module
    cmds:
      - go fmt ./...

  tui:check:
    desc: Build, vet, and lint the TUI
    cmds:
      - task: tui:build
      - task: tui:vet
      - task: tui:lint

  # ---------------------------------------------------------------------------
  # All modules
  # ---------------------------------------------------------------------------
  build:
    desc: Build all modules
    cmds:
      - task: sdk:build
      - task: tui:build

  vet:
    desc: Run go vet on all modules
    cmds:
      - task: sdk:vet
      - task: tui:vet

  test:
    desc: Run tests for all modules
    cmds:
      - task: sdk:test

  lint:
    desc: Run golangci-lint on all modules
    cmds:
      - task: sdk:lint
      - task: tui:lint

  fmt:
    desc: Auto-fix formatting on all modules
    cmds:
      - task: sdk:fmt
      - task: tui:fmt

  check:
    desc: Build, vet, lint, and test all modules
    cmds:
      - task: sdk:check
      - task: tui:check
